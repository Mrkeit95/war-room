<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The War Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --canvas: #050505;
    --surface: #0c0c0d;
    --surface-2: #131315;
    --surface-3: #1a1a1c;
    --border: rgba(255,255,255,0.06);
    --border-strong: rgba(255,255,255,0.10);
    --text: #f5f5f7;
    --text-2: #a1a1a6;
    --text-3: #6a6a70;
    --text-4: #46464a;
    --green: #4ade80;
    --yellow: #fde047;
    --amber: #fbbf24;
    --orange: #fb923c;
    --red: #ef4444;
    --blue: #60a5fa;
    --violet: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px; line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.01em;
  }
  .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    background: var(--bg); border-right: 1px solid var(--border);
    padding: 24px 14px; position: sticky; top: 0;
    height: 100vh; overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .brand { padding: 6px 12px 32px; }
  .brand-name { font-size: 15px; font-weight: 700; letter-spacing: 0.32em; line-height: 1; }
  .brand-divider { height: 1px; background: var(--border); margin-top: 12px; }
  .nav-group { margin-bottom: 18px; }
  .nav-group-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.16em;
    color: var(--text-4); padding: 0 12px 8px; font-weight: 500;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 12px; border-radius: 8px;
    color: var(--text-2); font-size: 13.5px;
    cursor: pointer; transition: all 0.12s;
    border: 1px solid transparent; user-select: none;
  }
  .nav-item:hover { background: var(--surface); color: var(--text); }
  .nav-item.active { background: var(--surface-2); color: var(--text); border-color: var(--border); }
  .nav-item svg { width: 16px; height: 16px; stroke: currentColor; flex-shrink: 0; }
  .nav-badge {
    margin-left: auto; font-size: 10px;
    background: var(--surface-3); color: var(--text-2);
    padding: 1px 7px; border-radius: 10px; font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
  }
  .sidebar-user {
    margin-top: auto;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
  }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #4ade80, #60a5fa);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: var(--bg); flex-shrink: 0;
  }
  .u-name { font-size: 13px; font-weight: 500; }
  .u-role { font-size: 11px; color: var(--text-3); }

  /* MAIN */
  .main { background: var(--canvas); min-height: 100vh; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--canvas);
    position: sticky; top: 0; z-index: 20;
    backdrop-filter: blur(8px);
  }
  .topbar-title { font-size: 15px; font-weight: 500; letter-spacing: -0.005em; }
  .topbar-actions { display: flex; align-items: center; gap: 14px; }
  .search-wrap { position: relative; width: 280px; }
  .search-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 8px 12px 8px 34px;
    border-radius: 8px; font-size: 13px; font-family: inherit; outline: none;
    transition: all 0.12s;
  }
  .search-input:focus { border-color: var(--border-strong); background: var(--surface-2); }
  .search-input::placeholder { color: var(--text-4); }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    width: 14px; height: 14px; color: var(--text-3); pointer-events: none;
  }
  .search-results {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--surface-2); border: 1px solid var(--border-strong);
    border-radius: 10px; padding: 6px;
    max-height: 360px; overflow-y: auto;
    box-shadow: 0 12px 32px rgba(0,0,0,0.5);
    z-index: 100; display: none;
  }
  .search-results.open { display: block; }
  .search-result {
    padding: 10px 12px; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
  }
  .search-result:hover { background: var(--surface-3); }
  .sr-grade {
    width: 24px; height: 24px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 11px; flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
  }
  .sr-name { font-size: 13px; font-weight: 500; }
  .sr-info { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .search-empty { padding: 18px; text-align: center; color: var(--text-3); font-size: 13px; }
  .icon-btn {
    width: 34px; height: 34px; border-radius: 8px;
    background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-2); cursor: pointer; position: relative;
  }
  .icon-btn:hover { background: var(--surface-2); color: var(--text); }
  .icon-btn svg { width: 16px; height: 16px; stroke: currentColor; }
  .badge-dot {
    position: absolute; top: 6px; right: 6px;
    width: 7px; height: 7px; background: var(--green);
    border-radius: 50%; border: 2px solid var(--canvas);
  }
  .content { padding: 28px 32px 60px; max-width: 1640px; margin: 0 auto; }

  .page-heading { margin-bottom: 28px; }
  .page-heading h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
  .page-heading .ph-sub { font-size: 13.5px; color: var(--text-3); }

  /* Hero */
  .hero-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 14px; }
  .hero-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 22px 24px;
    cursor: pointer; transition: all 0.15s;
  }
  .hero-card:hover { border-color: var(--border-strong); background: var(--surface-2); }
  .hero-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .hero-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-3); font-weight: 500; }
  .hero-icon {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--surface-3); color: var(--text-2);
    display: flex; align-items: center; justify-content: center;
  }
  .hero-icon svg { width: 14px; height: 14px; }
  .hero-value { font-size: 36px; font-weight: 700; letter-spacing: -0.025em; line-height: 1; }
  .hero-meta { margin-top: 8px; font-size: 12px; color: var(--text-3); display: flex; justify-content: space-between; }
  .hero-meta .delta { color: var(--green); font-weight: 500; }
  .hero-meta .delta.down { color: var(--red); }
  .hero-progress { margin-top: 14px; height: 4px; background: var(--surface-3); border-radius: 2px; overflow: hidden; }
  .hero-progress-fill { height: 100%; border-radius: 2px; }
  .hp-green { background: var(--green); box-shadow: 0 0 12px rgba(74,222,128,0.4); }
  .hp-yellow { background: var(--yellow); box-shadow: 0 0 12px rgba(253,224,71,0.3); }
  .hp-amber { background: var(--amber); }
  .hp-red { background: var(--red); }

  /* Department row */
  .dept-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 32px; }
  .dept-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px 22px;
    cursor: pointer; transition: all 0.15s;
  }
  .dept-card:hover { border-color: var(--border-strong); background: var(--surface-2); }
  .dept-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .dept-name { font-size: 11px; text-transform: uppercase; letter-spacing: 0.16em; color: var(--text-3); font-weight: 500; margin-bottom: 6px; }
  .dept-manager { font-size: 12px; color: var(--text-3); }
  .dept-pct { font-size: 32px; font-weight: 700; letter-spacing: -0.025em; line-height: 1; margin-bottom: 4px; }
  .dept-pct-sub { font-size: 11px; color: var(--text-3); margin-bottom: 14px; }
  .dept-bar { height: 4px; background: var(--surface-3); border-radius: 2px; overflow: hidden; margin-bottom: 16px; }
  .dept-bar-fill { height: 100%; border-radius: 2px; }
  .dept-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px; font-size: 12px; }
  .dept-stat { display: flex; justify-content: space-between; }
  .dept-stat-label { color: var(--text-3); }
  .dept-stat-value { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .dept-stat-value.up { color: var(--green); }
  .dept-stat-value.down { color: var(--red); }

  /* Two col */
  .two-col { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; margin-bottom: 32px; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px 24px; }
  .panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .panel-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.16em;
    color: var(--text-3); font-weight: 500;
    display: flex; align-items: center; gap: 8px;
  }
  .panel-title svg { width: 14px; height: 14px; }
  .panel-link { font-size: 12px; color: var(--text-3); cursor: pointer; transition: color 0.12s; }
  .panel-link:hover { color: var(--text); }

  .time-toggle {
    display: inline-flex; background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 3px; margin-bottom: 18px;
  }
  .time-btn {
    background: none; border: none; color: var(--text-3); font-family: inherit;
    font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 5px;
    cursor: pointer; transition: all 0.12s;
  }
  .time-btn:hover { color: var(--text); }
  .time-btn.active { background: var(--surface-3); color: var(--text); }

  /* Ranked */
  .ranked-list { display: flex; flex-direction: column; gap: 14px; }
  .ranked-row { display: flex; align-items: center; gap: 14px; cursor: pointer; }
  .ranked-num { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-3); width: 16px; flex-shrink: 0; }
  .ranked-avatar {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--surface-3); color: var(--text-2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; flex-shrink: 0;
  }
  .ranked-body { flex: 1; min-width: 0; }
  .ranked-name { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .ranked-bar { height: 4px; background: var(--surface-3); border-radius: 2px; overflow: hidden; }
  .ranked-bar-fill { height: 100%; border-radius: 2px; }
  .ranked-pct { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-2); text-align: right; width: 56px; flex-shrink: 0; }

  /* Upcoming */
  .upcoming-list { display: flex; flex-direction: column; }
  .upcoming-row { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .upcoming-row:last-child { border-bottom: none; }
  .upcoming-bar { width: 3px; border-radius: 1.5px; flex-shrink: 0; background: var(--yellow); }
  .upcoming-bar.green { background: var(--green); }
  .upcoming-bar.red { background: var(--red); }
  .upcoming-body { flex: 1; min-width: 0; }
  .upcoming-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .upcoming-meta { font-size: 11px; color: var(--text-3); }

  /* Items */
  .items { display: flex; flex-direction: column; gap: 8px; }
  .group-label {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.16em;
    color: var(--text-4); margin: 20px 0 10px; font-weight: 500;
    display: flex; align-items: center; gap: 10px;
  }
  .group-label:first-child { margin-top: 0; }
  .item {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
    display: flex; gap: 14px;
    cursor: pointer; position: relative; transition: all 0.12s;
  }
  .item::before {
    content: ""; position: absolute; left: 0; top: 14px; bottom: 14px;
    width: 2px; background: var(--text-4); border-radius: 0 1px 1px 0;
  }
  .item:hover { background: var(--surface-3); border-color: var(--border-strong); }
  .item.critical::before { background: var(--red); }
  .item.warning::before { background: var(--amber); }
  .item.info::before { background: var(--blue); }
  .item.forecast::before { background: var(--blue); }
  .item.rhythm::before { background: var(--green); }
  .item.personal::before { background: var(--violet); }
  .item.spotlight::before { background: var(--yellow); }
  .item.done { opacity: 0.45; }
  .item.done .item-title { text-decoration: line-through; }
  .checkbox {
    width: 18px; height: 18px;
    border: 1.5px solid var(--text-4); border-radius: 5px;
    flex-shrink: 0; margin-top: 2px; margin-left: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
  }
  .checkbox:hover { border-color: var(--text-2); }
  .item.done .checkbox { background: var(--green); border-color: var(--green); color: var(--bg); }
  .item.done .checkbox::after { content: "✓"; font-size: 12px; font-weight: 700; }
  .item-body { flex: 1; min-width: 0; }
  .item-title { font-size: 13.5px; font-weight: 500; margin-bottom: 4px; line-height: 1.4; }
  .item-meta { font-size: 12px; color: var(--text-3); display: flex; flex-wrap: wrap; gap: 4px 10px; }
  .item-meta .sep { color: var(--text-4); }
  .candidates { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .candidate-pill {
    background: var(--surface-3); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px;
    font-size: 11.5px; color: var(--text-2);
    display: flex; align-items: center; gap: 6px;
    cursor: pointer;
  }
  .candidate-pill:hover { background: var(--bg); color: var(--text); border-color: var(--border-strong); }
  .candidate-pill .grade-mini { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 11px; }
  .item-tag {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    padding: 3px 8px; border-radius: 5px; font-weight: 500;
    white-space: nowrap; font-family: 'JetBrains Mono', monospace;
  }
  .tag-critical { background: rgba(239,68,68,0.10); color: var(--red); }
  .tag-warning { background: rgba(251,191,36,0.10); color: var(--amber); }
  .tag-info { background: rgba(96,165,250,0.10); color: var(--blue); }
  .tag-forecast { background: rgba(96,165,250,0.10); color: var(--blue); }
  .tag-rhythm { background: rgba(74,222,128,0.10); color: var(--green); }
  .tag-personal { background: rgba(167,139,250,0.10); color: var(--violet); }
  .tag-spotlight { background: rgba(253,224,71,0.10); color: var(--yellow); }
  .item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }

  .add-reminder {
    background: var(--surface);
    border: 1px dashed var(--border-strong); border-radius: 10px;
    padding: 10px 16px;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 12px; cursor: text;
  }
  .add-reminder:focus-within { border-color: var(--violet); border-style: solid; }
  .add-reminder .plus { color: var(--text-4); font-size: 14px; }
  .add-reminder input {
    background: none; border: none; color: var(--text);
    font-size: 13.5px; font-family: inherit; width: 100%; outline: none;
  }
  .add-reminder input::placeholder { color: var(--text-4); }

  .grade-A { background: rgba(74,222,128,0.15); color: var(--green); }
  .grade-B { background: rgba(96,165,250,0.15); color: var(--blue); }
  .grade-C { background: rgba(253,224,71,0.15); color: var(--yellow); }
  .grade-D { background: rgba(251,146,60,0.15); color: var(--orange); }
  .grade-F { background: rgba(239,68,68,0.18); color: var(--red); }

  /* MODAL */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    z-index: 100; display: none;
    align-items: flex-start; justify-content: center;
    padding: 60px 20px 40px; overflow-y: auto;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: 16px; width: 100%; max-width: 760px; padding: 28px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    animation: modalIn 0.18s ease-out;
  }
  @keyframes modalIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .modal-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 22px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
  .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.015em; }
  .modal-subtitle { font-size: 13px; color: var(--text-3); }
  .modal-close {
    background: var(--surface-2); border: 1px solid var(--border);
    color: var(--text-3);
    width: 32px; height: 32px; border-radius: 8px;
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: var(--surface-3); color: var(--text); }
  .modal-section { margin-bottom: 24px; }
  .modal-section-title { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.16em; color: var(--text-4); font-weight: 500; margin-bottom: 10px; }
  .candidate-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 6px; gap: 12px;
  }
  .candidate-row.clickable { cursor: pointer; }
  .candidate-row.clickable:hover { background: var(--surface-3); border-color: var(--border-strong); }
  .cand-left { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1; }
  .candidate-row .name { font-weight: 500; font-size: 13.5px; }
  .candidate-row .info { font-size: 12px; color: var(--text-3); display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 2px; }
  .candidate-row .info .flag { background: rgba(239,68,68,0.10); color: var(--red); padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 500; }
  .candidate-row .info .strength { background: rgba(74,222,128,0.10); color: var(--green); padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 500; }
  .candidate-row .days-tag { font-size: 11px; padding: 3px 8px; border-radius: 5px; font-weight: 500; white-space: nowrap; font-family: 'JetBrains Mono', monospace; }
  .days-tag.ok { background: rgba(74,222,128,0.10); color: var(--green); }
  .days-tag.warn { background: rgba(251,191,36,0.10); color: var(--amber); }
  .days-tag.bad { background: rgba(239,68,68,0.10); color: var(--red); }
  .grade-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 6px;
    font-weight: 700; font-size: 12px; flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
  }
  .trajectory { font-size: 13px; font-weight: 600; margin-left: 4px; font-family: 'JetBrains Mono', monospace; }
  .trajectory.up { color: var(--green); }
  .trajectory.down { color: var(--red); }
  .trajectory.flat { color: var(--text-3); }
  .cand-header { display: flex; gap: 16px; align-items: flex-start; padding: 18px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 20px; }
  .cand-header .grade-badge { width: 48px; height: 48px; font-size: 22px; }
  .ch-body { flex: 1; min-width: 0; }
  .ch-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.015em; }
  .ch-stage { font-size: 12.5px; color: var(--text-3); margin-bottom: 10px; }
  .ch-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .ch-tag { font-size: 10.5px; padding: 3px 9px; border-radius: 5px; font-weight: 500; }
  .ch-tag.strength { background: rgba(74,222,128,0.10); color: var(--green); }
  .ch-tag.flag { background: rgba(239,68,68,0.10); color: var(--red); }
  .timeline { position: relative; padding-left: 20px; }
  .timeline::before { content: ""; position: absolute; left: 5px; top: 4px; bottom: 4px; width: 1px; background: var(--border-strong); }
  .tl-entry { position: relative; padding-bottom: 16px; }
  .tl-entry:last-child { padding-bottom: 0; }

function pipelineCard(id) {
  const c = CANDIDATES[id];
  if (!c) return '';
  const gradeHtml = c.grade ? `<div class="pc-grade grade-${c.grade}">${c.grade}</div>` : `<div class="pc-grade" style="background:var(--surface-3);color:var(--text-4)">—</div>`;
  const daysClass = c.days >= 5 ? 'bad' : c.days >= 3 ? 'warn' : 'ok';
  const daysText = c.days > 0 ? `${c.days}d` : '';
  return `
    <div class="pipeline-card" onclick="openCandidate('${id}')">
      <div class="pc-head">
        ${gradeHtml}
        <div class="pc-name">${c.name}</div>
      </div>
      <div class="pc-meta">
        <span class="pc-region">${c.region}</span>
        <span>${c.manager}</span>
        ${daysText ? `<span class="pc-days ${daysClass}">${daysText}</span>` : ''}
      </div>
    </div>
  `;
}

function initCalendar() { renderCalendar(); }
function calPrevMonth() { calCursor.setMonth(calCursor.getMonth() - 1); renderCalendar(); }
function calNextMonth() { calCursor.setMonth(calCursor.getMonth() + 1); renderCalendar(); }
function calGoToday() { calCursor = new Date(); calCursor.setDate(1); renderCalendar(); }

function renderCalendar() {
  const monthEl = document.getElementById('cal-month');
  const daysEl = document.getElementById('cal-days');
  if (!monthEl || !daysEl) return;

  const year = calCursor.getFullYear();
  const month = calCursor.getMonth();
  monthEl.textContent = calCursor.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  // Week starts Monday: day 0 = Sun, we want 6; day 1 = Mon, we want 0
  let startOffset = (firstDay.getDay() + 6) % 7;

  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  let html = '';
  // Prev month padding
  const prevMonthLast = new Date(year, month, 0).getDate();
  for (let i = startOffset - 1; i >= 0; i--) {
    const d = prevMonthLast - i;
    html += `<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`;
  }
  // Current month
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;
    const events = CAL_EVENTS[dateStr] || [];
    const visibleEvents = events.slice(0, 3);
    const more = events.length - visibleEvents.length;
    html += `
      <div class="cal-day ${isToday ? 'today' : ''}">
        <div class="cal-day-num">${d}</div>
        <div class="cal-events">
          ${visibleEvents.map(e => `<div class="cal-event ${e.type}" title="${e.title}">${e.title}</div>`).join('')}
          ${more > 0 ? `<div class="cal-event-more">+${more} more</div>` : ''}
        </div>
      </div>
    `;
  }
  // Next month padding to fill grid
  const cellsUsed = startOffset + lastDay.getDate();
  const cellsNeeded = Math.ceil(cellsUsed / 7) * 7;
  for (let d = 1; d <= cellsNeeded - cellsUsed; d++) {
    html += `<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`;
  }
  daysEl.innerHTML = html;
}

function candRow(name, grade, trajectory, info, extras, candidateId) {
  const gradeHtml = grade ? `<div class="grade-badge grade-${grade}">${grade}</div>` : '';

  const extraHtml = extras ? extras.map(e => `<span class="${e.type}">${e.text}</span>`).join(' ') : '';
  const clickAttr = candidateId ? `class="candidate-row clickable" onclick="openCandidate('${candidateId}', event)"` : 'class="candidate-row"';
  return `<div ${clickAttr}><div class="cand-left">${gradeHtml}<div style="min-width:0;flex:1"><div class="name">${name} ${trajHtml}</div><div class="info">${info} ${extraHtml}</div></div></div></div>`;
}

function openCandidate(id, ev) {
  if (ev) ev.stopPropagation();
  const c = CANDIDATES[id];
  if (!c) return;
  const tagsHtml = [...c.tags.strengths.map(s => `<span class="ch-tag strength">${s}</span>`), ...c.tags.flags.map(f => `<span class="ch-tag flag">${f}</span>`)].join('');
  const trajHtml = c.trajectory ? `<span class="trajectory ${c.trajectory}">${c.trajectory === 'up' ? '↑' : c.trajectory === 'down' ? '↓' : '→'}</span>` : '';
  const gradeHtml = c.grade ? `<div class="grade-badge grade-${c.grade}">${c.grade}</div>` : '<div class="grade-badge" style="background:var(--surface-3);color:var(--text-4)">—</div>';
  const timelineHtml = c.timeline.map(t => `<div class="tl-entry ${t.type}"><div class="tl-date">${t.date}</div><div class="tl-title">${t.title}${t.grade ? `<span class="tl-grade grade-${t.grade}">${t.grade}</span>` : ''}</div>${t.meta ? `<div class="tl-meta">${t.meta}</div>` : ''}</div>`).join('');
  const allNotes = [...c.notes, ...(SESSION_NOTES[id] || [])];
  const notesHtml = allNotes.length ? allNotes.map(n => `<div class="note"><div class="note-date">${n.date}</div><div class="note-text">${n.text.replace(/</g,'&lt;')}</div></div>`).join('') : '<div style="color:var(--text-4);font-size:13px;padding:8px 0">No notes yet</div>';

  document.getElementById('modal-title').textContent = c.name;
  document.getElementById('modal-subtitle').textContent = `${c.region} · ${c.stage} · ${c.manager}`;
  document.getElementById('modal-body').innerHTML = `
    <div class="cand-header">${gradeHtml}<div class="ch-body"><div class="ch-name">${c.name} ${trajHtml}</div><div class="ch-stage">${c.region} · ${c.stage} · ${c.manager}</div><div class="ch-tags">${tagsHtml || '<span style="font-size:11px;color:var(--text-4)">No tags</span>'}</div></div></div>
    <div class="modal-section"><div class="modal-section-title">Journey</div><div class="timeline">${timelineHtml || '<div style="color:var(--text-4);font-size:13px">No timeline yet</div>'}</div></div>
    <div class="modal-section"><div class="modal-section-title">Your private notes</div><div class="notes-list">${notesHtml}</div><div class="note-input-wrap"><textarea id="note-input" class="note-input" rows="2" placeholder="Add a note about ${c.name}…"></textarea><button class="note-save" onclick="saveNote('${id}')">Save</button></div></div>
  `;
  document.getElementById('modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function saveNote(id) {
  const input = document.getElementById('note-input');
  const text = input.value.trim();
  if (!text) return;
  if (!SESSION_NOTES[id]) SESSION_NOTES[id] = [];
  const dateStr = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  SESSION_NOTES[id].push({ date: `${dateStr} (just now)`, text });
  openCandidate(id);
}
function openModal(key, ev) {
  if (ev) ev.stopPropagation();
  const data = MODALS[key];
  if (!data) return;
  document.getElementById('modal-title').textContent = data.title;
  document.getElementById('modal-subtitle').textContent = data.subtitle;
  document.getElementById('modal-body').innerHTML = data.body();
  document.getElementById('modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  document.body.style.overflow = '';
}
function closeModalOnBackdrop(ev) { if (ev.target.id === 'modal-backdrop') closeModal(); }
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
function toggleDone(el, ev) { if (ev) ev.stopPropagation(); el.classList.toggle('done'); }

document.getElementById('search-input').addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  const results = document.getElementById('search-results');
  if (!q) { results.classList.remove('open'); return; }
  const matches = Object.entries(CANDIDATES).filter(([id, c]) => c.name.toLowerCase().includes(q)).slice(0, 8);
  if (matches.length === 0) { results.innerHTML = '<div class="search-empty">No candidates found</div>'; results.classList.add('open'); return; }
  results.innerHTML = matches.map(([id, c]) => {
    const gradeClass = c.grade ? `grade-${c.grade}` : '';
    const gradeText = c.grade || '—';
    const gradeStyle = !c.grade ? 'background:var(--surface-3);color:var(--text-4)' : '';
    return `<div class="search-result" onclick="openCandidate('${id}'); closeSearch();"><div class="sr-grade ${gradeClass}" style="${gradeStyle}">${gradeText}</div><div><div class="sr-name">${c.name}</div><div class="sr-info">${c.region} · ${c.stage}</div></div></div>`;
  }).join('');
  results.classList.add('open');
});
function closeSearch() { document.getElementById('search-input').value = ''; document.getElementById('search-results').classList.remove('open'); }
document.addEventListener('click', (e) => { if (!e.target.closest('.search-wrap')) document.getElementById('search-results').classList.remove('open'); });

const VIEW_LABELS = {
  today: { heading: 'TODAY · WHAT NEEDS YOU', count: '13 items' },
  week: { heading: 'THIS WEEK · THE BIG PICTURE', count: '8 items' },
  next: { heading: 'NEXT WEEK · PLANNING AHEAD', count: '5 items' }
};
function switchView(view) {
  document.querySelectorAll('.time-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  document.querySelectorAll('.view-content').forEach(v => v.style.display = v.dataset.view === view ? '' : 'none');
  document.getElementById('view-heading').textContent = VIEW_LABELS[view].heading;
  document.getElementById('view-count').textContent = VIEW_LABELS[view].count;
}
function initDashboardListeners() {
  const input = document.getElementById('reminder-input');
  if (!input) return;
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && input.value.trim()) {
      const item = document.createElement('div');
      item.className = 'item personal';
      item.onclick = (ev) => toggleDone(item, ev);
      item.innerHTML = `<div class="checkbox"></div><div class="item-body"><div class="item-title">${input.value.trim().replace(/</g,'&lt;')}</div></div><div class="item-right"><span class="item-tag tag-personal">Personal</span></div>`;
      document.getElementById('personal-items').appendChild(item);
      input.value = '';
    }
  });
}

navigate('dashboard');
</script>
</body>
</html>
